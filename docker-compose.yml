# =============================================================================
# ExpenseFlow — docker-compose.yml
# Production-parity orchestration for all services.
#
# Services:
#   sqlserver        — SQL Server 2022 (shared DB host, separate databases)
#   identity-service — ExpenseFlow.Identity.API  (port 5001)
#   expense-service  — ExpenseFlow.Expense.API   (port 5002)
#
# Usage:
#   docker-compose up --build          # first run
#   docker-compose up -d               # detached
#   docker-compose down -v             # tear down including volumes
# =============================================================================

version: '3.9'

services:

  # ---------------------------------------------------------------------------
  # SQL Server 2022
  # Both microservices connect to the same SQL host but use separate databases:
  #   ExpenseFlowIdentityDb  — owned by Identity Service
  #   ExpenseFlowExpenseDb   — owned by Expense Service
  # In production these would be separate SQL instances or Azure SQL databases.
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: expenseflow-sqlserver
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - expenseflow-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${SQL_SA_PASSWORD}",
             "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Identity Service
  # Handles registration, login, JWT issuance.
  # Depends on sqlserver being healthy before starting.
  # ---------------------------------------------------------------------------
  identity-service:
    build:
      context: .
      dockerfile: src/services/ExpenseFlow.Identity/ExpenseFlow.Identity.API/Dockerfile
    container_name: expenseflow-identity
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__IdentityDb: "Server=sqlserver;Database=ExpenseFlowIdentityDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      JwtSettings__Issuer: "ExpenseFlow.Identity"
      JwtSettings__Audience: "ExpenseFlow.Client"
      JwtSettings__ExpiryMinutes: "15"
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - expenseflow-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Expense Service
  # Handles expense lifecycle. Validates JWTs issued by Identity Service.
  # Shares the same JWT secret so tokens are trusted cross-service.
  # ---------------------------------------------------------------------------
  expense-service:
    build:
      context: .
      dockerfile: src/services/ExpenseFlow.Expense/ExpenseFlow.Expense.API/Dockerfile
    container_name: expenseflow-expense
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__ExpenseDb: "Server=sqlserver;Database=ExpenseFlowExpenseDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      JwtSettings__Issuer: "ExpenseFlow.Identity"
      JwtSettings__Audience: "ExpenseFlow.Client"
    ports:
      - "5002:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - expenseflow-network
    restart: unless-stopped

volumes:
  sqlserver-data:
    driver: local

networks:
  expenseflow-network:
    driver: bridge

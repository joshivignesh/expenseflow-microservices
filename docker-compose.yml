# =============================================================================
# ExpenseFlow — docker-compose.yml
# Full stack: SQL Server + Identity + Expense + API Gateway
#
# External entry point: http://localhost:5000  (Gateway)
# Internal ports (direct access for dev/debug):
#   Identity  → http://localhost:5001
#   Expense   → http://localhost:5002
#
# Usage:
#   docker-compose up --build
#   docker-compose up -d
#   docker-compose down -v
# =============================================================================

version: '3.9'

services:

  # ---------------------------------------------------------------------------
  # SQL Server 2022
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: expenseflow-sqlserver
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - expenseflow-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${SQL_SA_PASSWORD}",
             "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Identity Service
  # ---------------------------------------------------------------------------
  identity-service:
    build:
      context: .
      dockerfile: src/services/ExpenseFlow.Identity/ExpenseFlow.Identity.API/Dockerfile
    container_name: expenseflow-identity
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__IdentityDb: "Server=sqlserver;Database=ExpenseFlowIdentityDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      JwtSettings__Issuer: "ExpenseFlow.Identity"
      JwtSettings__Audience: "ExpenseFlow.Client"
      JwtSettings__ExpiryMinutes: "15"
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - expenseflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Expense Service
  # ---------------------------------------------------------------------------
  expense-service:
    build:
      context: .
      dockerfile: src/services/ExpenseFlow.Expense/ExpenseFlow.Expense.API/Dockerfile
    container_name: expenseflow-expense
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__ExpenseDb: "Server=sqlserver;Database=ExpenseFlowExpenseDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      JwtSettings__Issuer: "ExpenseFlow.Identity"
      JwtSettings__Audience: "ExpenseFlow.Client"
    ports:
      - "5002:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - expenseflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # API Gateway (YARP)
  # Single entry point for all external traffic.
  # Waits for both services to be healthy before starting.
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: src/gateway/ExpenseFlow.Gateway/Dockerfile
    container_name: expenseflow-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      JwtSettings__Issuer: "ExpenseFlow.Identity"
      JwtSettings__Audience: "ExpenseFlow.Client"
      Cors__AllowedOrigins__0: "${FRONTEND_ORIGIN:-http://localhost:3000}"
    ports:
      - "5000:8080"   # THE only port the frontend / client should call
    depends_on:
      identity-service:
        condition: service_healthy
      expense-service:
        condition: service_healthy
    networks:
      - expenseflow-network
    restart: unless-stopped

volumes:
  sqlserver-data:
    driver: local

networks:
  expenseflow-network:
    driver: bridge

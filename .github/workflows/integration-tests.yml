name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  identity-integration-tests:
    name: Identity Service — Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Docker is pre-installed on ubuntu-latest — Testcontainers uses it to spin up SQL Server
      - name: Run Identity Integration Tests
        run: |
          dotnet test tests/ExpenseFlow.Identity.IntegrationTests/ExpenseFlow.Identity.IntegrationTests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=identity-results.trx" \
            --results-directory ./TestResults

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Identity Integration Test Results
          path: TestResults/identity-results.trx
          reporter: dotnet-trx

  expense-integration-tests:
    name: Expense Service — Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Expense Integration Tests
        run: |
          dotnet test tests/ExpenseFlow.Expense.IntegrationTests/ExpenseFlow.Expense.IntegrationTests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=expense-results.trx" \
            --results-directory ./TestResults

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Expense Integration Test Results
          path: TestResults/expense-results.trx
          reporter: dotnet-trx
